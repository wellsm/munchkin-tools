server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # SPA: try file, then directory, then fall back to index.html for client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed asset files (Vite emits with content hashes) — cache forever
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Font files
  location ~* \.(ttf|woff|woff2|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html must always be fresh so users pick up new bundle hashes
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
